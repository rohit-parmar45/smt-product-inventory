services:
  # --------------------------------------------------
  # PHP-FPM Application
  # --------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventory_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html             # Mount entire project folder (includes wait-for-db.sh)
      - app-storage:/var/www/html/storage
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-product_inventory}
      - DB_USERNAME=${DB_USERNAME:-inventory_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - DB_SSL_MODE=DISABLED
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["sh", "/var/www/html/wait-for-db.sh", "php-fpm"]  # Run wait-for-db first
    networks:
      - inventory-net

  # --------------------------------------------------
  # Nginx Web Server
  # --------------------------------------------------
  webserver:
    image: nginx:alpine
    container_name: inventory_webserver
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - inventory-net

  # --------------------------------------------------
  # MySQL Database
  # --------------------------------------------------
  db:
    image: mysql:8.0
    container_name: inventory_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-product_inventory}
      MYSQL_USER: ${DB_USERNAME:-inventory_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    command: --ssl-mode=DISABLED

    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - inventory-net

  # --------------------------------------------------
  # Redis Cache / Queue
  # --------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: inventory_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - inventory-net

networks:
  inventory-net:
    driver: bridge

volumes:
  dbdata:
    driver: local
  app-storage:
    driver: local